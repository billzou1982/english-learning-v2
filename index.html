<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英语学习工坊 - Master English Effortlessly</title>
  <meta name="description" content="基于认知规律设计的英语学习平台。不仅学习单词的含义，更理解其背后的语境与逻辑。">
  <link rel="stylesheet" href="css/minimal.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1 class="hero-title">
        <span id="title-1">Master English</span>
        <span id="title-2">One Concept</span>
        <span id="title-3">At a Time</span>
      </h1>
      <p class="hero-subtitle" id="hero-subtitle">从高阶词汇到沟通艺术，系统构建你的英语思维模型</p>
      
      <div id="demo-area" class="demo-area"></div>

      <div class="cta-group">
        <a href="learn.html" class="btn btn-primary" id="cta-primary">开始学习 →</a>
      </div>
    </header>

    <section class="stats" id="stats-container">
      <!-- Stats injected by JS -->
    </section>

    <footer style="margin-top: 100px; padding: 48px 0; border-top: 1px solid var(--border); text-align: center;">
      <p id="footer-tagline" style="font-weight: 700; margin-bottom: 12px;"></p>
      <p id="footer-desc" style="color: var(--text-muted); max-width: 600px; margin: 0 auto; font-size: 14px;"></p>
    </footer>
  </div>

  <script src="js/wordData.js"></script>
  <script src="js/siteConfig.js"></script>
  <script>
    // Initialize content from siteConfig
    document.getElementById('title-1').textContent = siteConfig.hero.title[0];
    document.getElementById('title-2').textContent = siteConfig.hero.title[1];
    document.getElementById('title-3').textContent = siteConfig.hero.title[2];
    document.getElementById('hero-subtitle').textContent = siteConfig.hero.subtitle;
    document.getElementById('cta-primary').textContent = siteConfig.cta.primary;
    document.getElementById('footer-tagline').textContent = siteConfig.footer.tagline;
    document.getElementById('footer-desc').textContent = siteConfig.footer.description;

    const statsContainer = document.getElementById('stats-container');
    siteConfig.stats.forEach(s => {
      const div = document.createElement('div');
      div.className = 'stat-item';
      div.innerHTML = `<div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>`;
      statsContainer.appendChild(div);
    });

    // Simple word animation
    const demoArea = document.getElementById('demo-area');
    let currentIdx = 0;
    function rotateWords() {
      const word = WordRoots[currentIdx];
      demoArea.innerHTML = `<div class="fade-in">${word.root}</div>`;
      currentIdx = (currentIdx + 1) % Math.min(WordRoots.length, siteConfig.hero.animation.demoCount);
    }
    if (siteConfig.hero.animation.enabled) {
      rotateWords();
      setInterval(rotateWords, 3000);
    }
  </script>
</body>
</html>
