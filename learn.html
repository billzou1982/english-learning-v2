<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习引擎 - 英语学习工坊</title>
  <link rel="stylesheet" href="css/minimal.css">
  <style>
    .learn-container { padding: 48px 0; max-width: 600px; margin: 0 auto; }
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 32px; }
    .audio-btn { cursor: pointer; display: inline-flex; align-items: center; background: #fffbeb; border: 1px solid var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-left: 12px; }
    .en-meaning { font-style: italic; color: var(--text-muted); font-size: 14px; margin-top: 4px; border-left: 2px solid var(--border); padding-left: 10px; }
  </style>
</head>
<body>
  <div class="container learn-container">
    <a href="index.html" style="text-decoration: none; color: var(--text-muted); font-size: 14px;">← 返回首页</a>
    
    <div id="content-card" class="card" style="margin-top: 24px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 8px;">
           <h1 id="word-root" style="font-size: 32px;"></h1>
           <span id="word-phonetic" style="color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 18px; margin-left: 4px;"></span>
           <button id="speak-btn" class="audio-btn">🔊 朗读</button>
        </div>
        <span id="word-origin" class="stat-badge" style="background: #f3f4f6; font-size: 10px; padding: 2px 6px; border-radius: 4px;"></span>
      </div>
      <div style="margin-top: 12px;">
        <p id="word-meaning-zh" style="font-size: 20px; font-weight: 700; color: #b45309;"></p>
        <p id="word-meaning-en" class="en-meaning"></p>
      </div>
      <div style="position: relative; background: #f8fafc; padding: 16px; border-radius: 12px; margin: 20px 0; border-left: 4px solid #3b82f6;">
        <p id="word-description" style="color: var(--text-muted); font-size: 15px; line-height: 1.6; padding-right: 40px;"></p>
        <button id="speak-desc-btn" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 20px;">🔊</button>
      </div>
    </div>

    <div id="quiz-section" class="card" style="margin-top: 16px; border-top: 4px solid var(--primary);">
        <h4 id="quiz-q" style="margin-bottom: 12px;"></h4>
        <div id="quiz-options" style="display: grid; gap: 8px;"></div>
    </div>

    <div class="nav-buttons">
      <div id="progress-text" style="align-self: center; font-size: 14px; color: var(--text-muted);"></div>
      <button id="next-btn" class="btn btn-primary" style="display:none">继续下一个</button>
    </div>
  </div>

  <script src="js/wordData.js"></script>
  <script src="js/memory.js"></script>
  <script>
    const level = localStorage.getItem('selectedLevel') || 'Beginner';
    const mode = localStorage.getItem('mode') || 'learn';
    
    let pool = WordRoots.filter(w => w.level === level);
    if (mode === 'review') {
        const mem = getMemoryData();
        pool = WordRoots.filter(w => mem[w.id] && Date.now() > mem[w.id].nextReview);
    }

    let currentIndex = 0;

    function render() {
      const item = pool[currentIndex];
      if (!item) {
          alert("该级别暂无待学习词汇或复习词汇已清空！");
          window.location.href = 'index.html';
          return;
      }
      document.getElementById('word-root').textContent = item.root;
      document.getElementById('word-phonetic').textContent = item.phonetic || '';
      document.getElementById('word-meaning-zh').textContent = item.meaning;
      document.getElementById('word-meaning-en').textContent = item.meaning_en;
      document.getElementById('word-description').textContent = item.description;
      document.getElementById('word-origin').textContent = item.origin;
      document.getElementById('speak-btn').onclick = () => {
          const msg = new SpeechSynthesisUtterance(item.root);
          msg.lang = 'en-US';
          window.speechSynthesis.speak(msg);
      };

      document.getElementById('speak-desc-btn').onclick = () => {
          const msg = new SpeechSynthesisUtterance(item.description);
          msg.lang = 'en-US';
          msg.rate = 0.9;
          window.speechSynthesis.speak(msg);
      };

      // Quiz
      document.getElementById('quiz-q').textContent = item.quiz.question;
      const opts = document.getElementById('quiz-options');
      opts.innerHTML = '';
      item.quiz.options.forEach((o, i) => {
          const b = document.createElement('button');
          b.className = 'btn';
          b.style = 'border: 1px solid var(--border); text-align: left;';
          b.textContent = o;
          b.onclick = () => check(i);
          opts.appendChild(b);
      });
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${pool.length}`;
    }

    function check(idx) {
        const item = pool[currentIndex];
        const success = (idx === item.quiz.correctAnswer);
        saveMemoryProgress(item.id, success);
        
        const opts = document.getElementById('quiz-options').children;
        for(let i=0; i<opts.length; i++) {
            opts[i].style.background = (i === item.quiz.correctAnswer) ? '#dcfce7' : (i === idx ? '#fee2e2' : '#fff');
            opts[i].disabled = true;
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    document.getElementById('next-btn').onclick = () => {
        currentIndex++;
        if (currentIndex < pool.length) render();
        else {
            localStorage.setItem('mode', 'learn');
            alert("本组学习完成！记忆引擎已更新。");
            window.location.href = 'index.html';
        }
    }

    render();
  </script>
</body>
</html>
