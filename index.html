<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英语学习工坊 - 记忆引擎版</title>
  <link rel="stylesheet" href="css/minimal.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    .level-card { background: white; border: 1px solid var(--border); padding: 24px; border-radius: 16px; cursor: pointer; transition: all 0.2s; text-align: left; }
    .level-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .level-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; margin-bottom: 8px; }
    .level-Beginner { background: #dcfce7; color: #166534; }
    .level-Intermediate { background: #fef9c3; color: #854d0e; }
    .level-Advanced { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="container">
    <header class="hero" style="padding: 64px 0;">
      <h1 class="hero-title">选择你的挑战等级</h1>
      <p class="hero-subtitle">5000+ 高频词库已就绪，基于艾宾浩斯记忆曲线动态调整</p>
    </header>

    <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
      <div class="level-card" onclick="startLevel('Beginner')">
        <span class="level-badge level-Beginner">入门级</span>
        <h3 style="font-size: 20px;">L1: 生活基础 (<span id="count-Beginner">...</span>词)</h3>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">涵盖购物、问候、基础动作。适合零基础或找回感觉。</p>
      </div>
      <div class="level-card" onclick="startLevel('Intermediate')">
        <span class="level-badge level-Intermediate">进阶级</span>
        <h3 style="font-size: 20px;">L2: 职场生活 (<span id="count-Intermediate">...</span>词)</h3>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">通勤、会议、财务规划。美国中产日常高频词汇。</p>
      </div>
      <div class="level-card" onclick="startLevel('Advanced')">
        <span class="level-badge level-Advanced">精通级</span>
        <h3 style="font-size: 20px;">L3: 思想表达 (<span id="count-Advanced">...</span>词)</h3>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">探讨社会、科技、抽象概念。让表达更有深度。</p>
      </div>
    </div>

    <div id="review-alert" style="display:none; margin-top: 48px; background: #eff6ff; border: 1px solid #bfdbfe; padding: 16px; border-radius: 12px; display: flex; align-items: center; gap: 12px;">
      <div style="font-size: 24px;">🧠</div>
      <div>
        <div style="font-weight: 700; color: #1e40af;">记忆引擎提醒</div>
        <div style="font-size: 13px; color: #3b82f6;">你有 <span id="review-count">0</span> 个单词进入了遗忘临界点，建议优先复习。</div>
      </div>
      <button class="btn btn-primary" style="margin-left: auto;" onclick="startReview()">立即复习</button>
    </div>
  </div>

  <script src="js/wordData.js"></script>
  <script>
    // 动态统计各级别词数
    const counts = { Beginner: 0, Intermediate: 0, Advanced: 0 };
    WordRoots.forEach(w => { if (counts[w.level] !== undefined) counts[w.level]++; });
    document.getElementById('count-Beginner').textContent = counts.Beginner;
    document.getElementById('count-Intermediate').textContent = counts.Intermediate;
    document.getElementById('count-Advanced').textContent = counts.Advanced;

    function startLevel(lvl) {
      localStorage.setItem('selectedLevel', lvl);
      window.location.href = 'learn.html';
    }

    // 模拟检测遗忘曲线
    const memoryData = JSON.parse(localStorage.getItem('memoryData') || '{}');
    const now = Date.now();
    let needsReview = 0;
    Object.values(memoryData).forEach(item => {
      if (now > item.nextReview) needsReview++;
    });

    if (needsReview > 0) {
      document.getElementById('review-alert').style.display = 'flex';
      document.getElementById('review-count').textContent = needsReview;
    }

    function startReview() {
      localStorage.setItem('mode', 'review');
      window.location.href = 'learn.html';
    }
  </script>
</body>
</html>
